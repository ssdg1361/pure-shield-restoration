{{ with .Params.faqs }}
<section class="section faq">
  <div class="container">
    <div class="section-head"><span class="eyebrow">FAQ</span><h2>Frequently asked questions</h2></div>
    <div class="faq-list">
      {{ range . }}<details class="qa"><summary>{{ .q }}<span class="pm"></span></summary><div class="ans"><p>{{ .a }}</p></div></details>{{ end }}
    </div>
  </div>
</section>
{{ end }}
